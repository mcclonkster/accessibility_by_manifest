interface:
  display_name: "Codebase Onboarding"
  short_description: "Analyze an unfamiliar codebase and generate a structured onboarding guide with architecture map, key entry points, conventions, and a starter agent instruction file such as AGENTS.md or CLAUDE.md. Use when joining a new project or setting up a coding agent harness for the first time in a repo."
  default_prompt: "Use the codebase-onboarding skill."
policy:
  allow_implicit_invocation: true
