interface:
  display_name: "Agent Sort"
  short_description: "Build an evidence-backed ECC install plan for a specific repo by sorting skills, commands, rules, hooks, and extras into DAILY vs LIBRARY buckets using parallel repo-aware review passes. Use when ECC should be trimmed to what a project actually needs instead of loading the full bundle."
  default_prompt: "Use the agent-sort skill."
policy:
  allow_implicit_invocation: true
